<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fantasy Tavern Board Games - Cart</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">Fantasy Tavern Board Games</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link active" href="cart.html">
          Cart <span id="cart-count" class="badge bg-primary d-none">0</span>
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <h1 class="mb-4">Your Game Crate</h1>

    <div id="empty-cart" class="text-center py-5 d-none">
      <p class="text-muted fs-5">Your Game Crate is empty.</p>
      <a href="index.html" class="btn btn-primary">Continue Shopping</a>
    </div>

    <div id="cart-content" class="d-none">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Game</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Total</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cart-items"></tbody>
        </table>
      </div>
      <div class="d-flex justify-content-between align-items-center border-top pt-3">
        <h4>Grand Total: <span id="cart-total" class="text-primary">$0.00</span></h4>
        <div>
          <a href="index.html" class="btn btn-outline-secondary me-2">Continue Shopping</a>
          <a href="checkout.html" class="btn btn-primary">Proceed to Tavern Checkout</a>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
